name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      ANALYZE: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Optional: bundle analysis (report saved as artifact)
      - name: Analyze bundle
        if: github.event_name == 'pull_request'
        run: ANALYZE=true next build --webpack
        continue-on-error: true  # analysis failure shouldn't block merge

      # Optional: Lighthouse audit (requires a deployed URL)
      # - name: Lighthouse audit
      #   if: github.event_name == 'push'
      #   uses: treosh/lighthouse-ci-action@v11
      #   with:
      #     urls: |
      #       https://mathspeedup.vercel.app
      #     uploadArtifacts: true
      #     temporaryPublicStorage: true

      # Vercel Deployment is handled natively by Vercel's GitHub integration.
      # Do NOT add a custom Deploy to Vercel step here, as it requires secrets
      # and creates duplicate deployment pipelines.